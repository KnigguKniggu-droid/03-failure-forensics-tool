vendors:
  - vendor_id: "openai-primary"
    display_name: "OpenAI Primary"
    api_base: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    model_mapping:
      "gpt-4o": "gpt-4o"
      "gpt-4o-mini": "gpt-4o-mini"
    priority: 0
    rate_limit_rps: 50
    rate_limit_burst: 100
    timeout_ms: 30000
    circuit_failure_threshold: 5
    circuit_recovery_timeout_s: 30
    latency_warning_ms: 2000
    latency_critical_ms: 5000

  - vendor_id: "anthropic-fallback"
    display_name: "Anthropic Fallback"
    api_base: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    model_mapping:
      "gpt-4o": "claude-3-5-sonnet"
      "gpt-4o-mini": "claude-3-haiku"
    priority: 1
    rate_limit_rps: 30
    rate_limit_burst: 60
    timeout_ms: 30000
    circuit_failure_threshold: 5
    circuit_recovery_timeout_s: 45
    latency_warning_ms: 2500
    latency_critical_ms: 6000

  - vendor_id: "ollama-local"
    display_name: "Ollama Local"
    api_base: "http://localhost:11434/v1"
    api_key_env: ""
    model_mapping:
      "gpt-4o": "llama3.1-8b-local"
      "gpt-4o-mini": "llama3.1-8b-local"
    priority: 2
    rate_limit_rps: 100
    rate_limit_burst: 200
    timeout_ms: 60000
    circuit_failure_threshold: 3
    circuit_recovery_timeout_s: 60
    latency_warning_ms: 5000
    latency_critical_ms: 15000

redis_url: "redis://localhost:6379"
enable_observability: true
enable_rate_limiting: true
enable_fallback: true
default_vendor: "openai-primary"
