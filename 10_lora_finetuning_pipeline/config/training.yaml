base_model: "meta-llama/Llama-3.1-8B"
output_dir: "./output/lora_adapter"
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "v_proj"
bias: "none"
task_type: "CAUSAL_LM"
learning_rate: 0.0002
num_train_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
warmup_ratio: 0.03
weight_decay: 0.01
max_seq_length: 2048
save_steps: 500
eval_steps: 500
logging_steps: 10
use_qlora: true
wandb_project: "lora-finetuning"
wandb_run_name: "domain-specific-v1"
