name: Prompt Regression Detection

on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'tests/ground_truth.json'
      - 'src/**'
  push:
    branches: [main]

jobs:
  regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run regression detection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m src.cli \
            --prompt prompts/classifier_v1.yaml \
            --tests tests/ground_truth.json

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: data/regression.db
          retention-days: 30
