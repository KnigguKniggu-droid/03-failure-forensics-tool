name: Self-Healing Documentation Check

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
      - '**/*.md'
      - '**/*.py'

jobs:
  doc-staleness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run AST parse and staleness detection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src.cli check --repo . --base main

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
